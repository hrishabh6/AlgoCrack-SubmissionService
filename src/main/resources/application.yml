server:
  port: 8080

spring:
  application:
    name: AlgoCrack-SubmissionService
  datasource:
    url: jdbc:mysql://localhost:3306/submission_db
    username: root
    password: hrishabh@123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

# Code Execution Service Configuration
cxe:
  service:
    url: http://localhost:8081
    timeout-seconds: 30

# Async Processing Configuration
async:
  core-pool-size: 5
  max-pool-size: 20
  queue-capacity: 100

# Logging
logging:
  level:
    com.hrishabh.algocracksubmissionservice: DEBUG

# Inter-service communication
services:
  problem:
    base-url: ${PROBLEM_SERVICE_URL:http://localhost:8084}
